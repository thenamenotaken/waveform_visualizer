<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IV Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="page-nav">
      <a href="index.html" class="page-nav-link active" aria-current="page">
        <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3 10h14M3 10l4-4M3 10l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><rect x="9" y="4" width="8" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        I-V Viewer
      </a>
      <a href="matrix.html" class="page-nav-link">
        <svg viewBox="0 0 20 20" aria-hidden="true"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        Comparison Matrix
      </a>
    </nav>
    <main class="shell">
      <section class="layout">
        <article class="scope-card">
          <div class="scope-toolbar">
            <div class="waveform-switcher" aria-label="Waveform selector">
              <button class="waveform-button" type="button" data-waveform="sine" aria-pressed="true">
                <span>Sine</span>
                <svg viewBox="0 0 42 18" aria-hidden="true" draggable="false">
                  <path d="M1 14 C11 2, 31 2, 41 14" />
                </svg>
              </button>
              <button class="waveform-button" type="button" data-waveform="triangle" aria-pressed="false">
                <span>Triangle</span>
                <svg viewBox="0 0 42 18" aria-hidden="true" draggable="false">
                  <polyline points="1,16 21,2 41,16" />
                </svg>
              </button>
              <button class="waveform-button" type="button" data-waveform="sawtooth" aria-pressed="false">
                <span>Sawtooth</span>
                <svg viewBox="0 0 42 18" aria-hidden="true" draggable="false">
                  <polyline points="1,16 37,2 37,16" />
                </svg>
              </button>
              <button class="waveform-button" type="button" data-waveform="square" aria-pressed="false">
                <span>Square</span>
                <svg viewBox="0 0 42 18" aria-hidden="true" draggable="false">
                  <polyline points="1,16 1,4 32,4 32,16" />
                </svg>
              </button>
            </div>
          </div>
          <canvas id="ivCanvas" aria-label="Interactive I-V curve"></canvas>
        </article>

        <aside class="control-panel">
          <div class="panel-heading">
            <p class="eyebrow">Controls</p>
          </div>

          <label class="control">
            <span>
              Frequency
              <output id="frequencyValue"></output>
            </span>
            <input id="frequencySlider" type="range" />
          </label>

          <label class="control">
            <span>
              Voltage
              <output id="vppValue"></output>
            </span>
            <input id="vppSlider" type="range" />
          </label>

          <label class="control">
            <span>
              Ballast Resistance
              <output id="resistanceValue"></output>
            </span>
            <input id="resistanceSlider" type="range" />
          </label>

          <div class="control">
            <span>Display Mode</span>
            <div class="mode-buttons" aria-label="Display Mode">
              <button class="mode-button" type="button" data-display-mode="trueIv" aria-pressed="true">
                True I-V: CH1 vs (CH2 - CH1) / R
              </button>
              <button class="mode-button" type="button" data-display-mode="scopeXy" aria-pressed="false">
                Scope XY: CH1 vs CH2
              </button>
            </div>
          </div>

          <div class="inline-toggles" aria-label="Scope display options">
            <label>
              <input id="showGrid" type="checkbox" />
              <span>Grid</span>
            </label>
            <label>
              <input id="showAxes" type="checkbox" />
              <span>Axes</span>
            </label>
            <label>
              <input id="animateTrace" type="checkbox" />
              <span>Cursor</span>
            </label>
          </div>

          <div class="bounds-control" aria-label="Curve scaling options">
            <span>Curve scales with</span>
            <div class="inline-toggles compact-toggles">
              <label>
                <input id="unconstrainFrequency" type="checkbox" checked />
                <span>Frequency</span>
              </label>
              <label>
                <input id="unconstrainVoltage" type="checkbox" checked />
                <span>Voltage</span>
              </label>
              <label>
                <input id="unconstrainShunt" type="checkbox" />
                <span>Ballast</span>
              </label>
            </div>
          </div>

          <label class="toggle-row">
            <input id="smoothTrace" type="checkbox" checked />
            <span>Smooth measured noise</span>
          </label>

          <button id="snapNearest" type="button">Snap to nearest capture</button>
        </aside>
      </section>

      <!--
      <section class="wave-card">
        <div>
          <p class="eyebrow">Time-domain components</p>
        </div>
        <canvas id="waveCanvas" aria-label="Source, mushroom, and current waveforms"></canvas>
      </section>
      -->
    </main>

    <script src="triangle_hydrated.js"></script>
    <script src="sine_hydrated.js"></script>
    <script src="sawtooth_hydrated.js"></script>
    <script src="square_hydrated.js"></script>
    <script src="app.js"></script>
  </body>
</html>
